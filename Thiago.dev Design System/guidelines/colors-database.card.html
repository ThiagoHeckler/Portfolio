<!-- @dsCard group="Colors" viewport="700x160" name="Database semantics" subtitle="PostgreSQL blue · MongoDB green" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.set{display:flex;gap:8px}.sw{flex:1;border-radius:8px;overflow:hidden;border:1px solid var(--border)}.chip{height:48px}.lbl{padding:6px 8px;background:var(--surface-card)}.n{font-family:var(--font-mono);font-size:11px;color:var(--text-body)}.badge{display:inline-block;font-family:var(--font-mono);font-size:12px;padding:.16rem .55rem;border-radius:5px;border:1px solid transparent;margin-bottom:8px}</style>
</head><body><div class="grid">
<div><span class="badge" style="color:var(--db-pg);background:var(--db-pg-bg);border-color:var(--db-pg-border)">PostgreSQL</span>
<div class="set"><div class="sw"><div class="chip" style="background:var(--db-pg)"></div><div class="lbl"><div class="n">--db-pg</div></div></div><div class="sw"><div class="chip" style="background:var(--db-pg-bg)"></div><div class="lbl"><div class="n">-bg</div></div></div><div class="sw"><div class="chip" style="background:var(--db-pg-border)"></div><div class="lbl"><div class="n">-border</div></div></div></div></div>
<div><span class="badge" style="color:var(--db-mongo);background:var(--db-mongo-bg);border-color:var(--db-mongo-border)">MongoDB</span>
<div class="set"><div class="sw"><div class="chip" style="background:var(--db-mongo)"></div><div class="lbl"><div class="n">--db-mongo</div></div></div><div class="sw"><div class="chip" style="background:var(--db-mongo-bg)"></div><div class="lbl"><div class="n">-bg</div></div></div><div class="sw"><div class="chip" style="background:var(--db-mongo-border)"></div><div class="lbl"><div class="n">-border</div></div></div></div></div>
</div></body></html>
