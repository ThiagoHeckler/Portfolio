<!-- @dsCard group="Colors" viewport="700x150" name="Amber accent" subtitle="Brand accent + hover + tint" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:16px}.row{display:flex;gap:12px;flex-wrap:wrap}.sw{width:150px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}.chip{height:56px}.lbl{padding:8px 10px;background:var(--surface-card)}.n{font-family:var(--font-mono);font-size:12px;color:var(--text-body)}.h{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}</style>
</head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="lbl"><div class="n">--accent</div><div class="h">#e0a458</div></div></div>
<div class="sw"><div class="chip" style="background:var(--accent-hover)"></div><div class="lbl"><div class="n">--accent-hover</div><div class="h">#ecb977</div></div></div>
<div class="sw"><div class="chip" style="background:var(--accent-tint)"></div><div class="lbl"><div class="n">--accent-tint</div><div class="h">amber 10%</div></div></div>
</div></body></html>
