<!-- @dsCard group="Colors" viewport="700x140" name="Surfaces & borders" subtitle="Dark base, cards, hairlines" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:16px}.row{display:flex;gap:12px;flex-wrap:wrap}.sw{width:150px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}.chip{height:64px}.lbl{padding:8px 10px;background:var(--surface-card)}.n{font-family:var(--font-mono);font-size:12px;color:var(--text-body)}.h{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}</style>
</head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--bg-page)"></div><div class="lbl"><div class="n">--bg-page</div><div class="h">#12151c</div></div></div>
<div class="sw"><div class="chip" style="background:var(--surface-card)"></div><div class="lbl"><div class="n">--surface-card</div><div class="h">#1a1e27</div></div></div>
<div class="sw"><div class="chip" style="background:var(--border)"></div><div class="lbl"><div class="n">--border</div><div class="h">#262b36</div></div></div>
<div class="sw"><div class="chip" style="background:var(--border-hover)"></div><div class="lbl"><div class="n">--border-hover</div><div class="h">#333946</div></div></div>
</div></body></html>
