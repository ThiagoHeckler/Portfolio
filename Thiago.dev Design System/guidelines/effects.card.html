<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation & motion" subtitle="Card hover lift, header blur" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px;display:flex;gap:24px;align-items:center}.card{background:var(--surface-card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;width:180px;transition:var(--transition-card)}.card.lift{transform:translateY(-3px);border-color:var(--border-hover)}.t{color:var(--text-h3);font-size:15px;margin-bottom:4px}.h{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}</style>
</head><body>
<div><div class="card"><div class="t">Rest</div><div class="h">border --border</div></div></div>
<div><div class="card lift"><div class="t">Hover</div><div class="h">translateY(-3px)</div></div></div>
<div><div class="h">transition 0.18s ease<br>transform + border-color<br>header: blur(10px) saturate(140%)</div></div>
</body></html>
