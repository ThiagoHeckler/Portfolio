<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;height:100%}
  .tile{width:1280px;height:854px;display:flex;font-family:var(--font-mono)}
  .main{flex:1;background:var(--bg-page);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px}
  .main img{width:340px;height:340px}
  .name{font-size:120px;font-weight:600;color:var(--text-body)}
  .name .a{color:var(--accent)}
  .strip{width:150px;display:flex;flex-direction:column}
  .strip div{flex:1}
</style></head>
<body><div class="tile">
  <div class="main">
    <img src="assets/logo-th.svg" alt="TH">
    <div class="name">thiago<span class="a">.dev</span></div>
  </div>
  <div class="strip">
    <div style="background:#7db8e8"></div>
    <div style="background:#6fd89b"></div>
    <div style="background:#e0a458"></div>
  </div>
</div></body></html>
