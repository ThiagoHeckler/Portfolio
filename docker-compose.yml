# ============================================================
# Portfolio thiagoheckler.com.br — Infraestrutura completa
# VPS: 1 vCPU / 4 GB RAM — todos os limites dimensionados p/ isso
# ============================================================
#
# Subir tudo:        docker compose up -d
# Subir um projeto:  docker compose up -d siscontabil
# Logs:              docker compose logs -f <serviço>
# ============================================================

# Config comum a todas as apps Java (âncora YAML)
x-java-app: &java-app
  restart: unless-stopped
  mem_limit: 384m
  memswap_limit: 512m
  environment: &java-env
    # SerialGC: melhor escolha p/ 1 vCPU + heap pequeno
    JAVA_TOOL_OPTIONS: >-
      -Xmx160m
      -Xms64m
      -XX:MaxMetaspaceSize=128m
      -XX:+UseSerialGC
      -Xss512k
      -XX:MaxDirectMemorySize=32m
    SPRING_THREADS_VIRTUAL_ENABLED: "true"
    TZ: America/Sao_Paulo
  depends_on:
    postgres:
      condition: service_healthy
    mongo:
      condition: service_healthy
  networks: [web, data]

services:

  # ----------------------------------------------------------
  # REVERSE PROXY — Caddy (HTTPS automático)
  # Também serve o site principal (estático) direto do disco
  # ----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/site:ro          # site principal estático
      - caddy_data:/data             # certificados TLS
      - caddy_config:/config
      - ./caddy/logs:/var/log/caddy
    networks: [web]

  # ----------------------------------------------------------
  # BANCOS DE DADOS (uma instância de cada, compartilhada)
  # ----------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    mem_limit: 384m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    command: >-
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=60
      -c effective_cache_size=256MB
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [data]
    # Sem "ports:" de propósito — banco NUNCA exposto à internet.
    # Para acessar da sua máquina: túnel SSH
    #   ssh -L 5432:localhost:5432 usuario@vps

  mongo:
    image: mongo:8.0
    restart: unless-stopped
    mem_limit: 512m
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      TZ: America/Sao_Paulo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [data]

  # ----------------------------------------------------------
  # PROJETOS (7 apps Spring Boot)
  # Cada "image:" aponta p/ a imagem buildada no repo do projeto.
  # Todas herdam limites e JVM flags do bloco x-java-app.
  # ----------------------------------------------------------

  siscontabil:
    <<: *java-app
    image: thiagoheckler/siscontabil:latest
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/siscontabil
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

  task-api:
    <<: *java-app
    image: thiagoheckler/task-api:latest
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskapi
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

  link-shortener:
    <<: *java-app
    image: thiagoheckler/link-shortener:latest
    environment:
      <<: *java-env
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/links?authSource=admin

  estoque-dashboard:
    <<: *java-app
    image: thiagoheckler/estoque-dashboard:latest
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/estoque
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

  chat:
    <<: *java-app
    image: thiagoheckler/chat:latest
    environment:
      <<: *java-env
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/chat?authSource=admin

  auth-service:
    <<: *java-app
    image: thiagoheckler/auth-service:latest
    environment:
      <<: *java-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  pizzaria:
    <<: *java-app
    image: thiagoheckler/pizzaria-bollo:latest
    environment:
      <<: *java-env
      # Pedidos no Postgres, cardápio no Mongo
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pizzaria
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/pizzaria?authSource=admin

networks:
  web:   # Caddy <-> apps
  data:  # apps <-> bancos (bancos não ficam na rede "web")

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  mongo_data:
